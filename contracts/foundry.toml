[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = true           # Required for SP1 proof verification in tests

[profile.default.fuzz]
runs = 256

[profile.ci]
fuzz = { runs = 10000 }


# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
